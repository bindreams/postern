## E2E test stack for the Postern portal.
##
## Always run with the dedicated project name so volumes and networks stay
## isolated from a co-located production stack. POSTERN_E2E_TLS_DIR must be
## set for any compose command other than `build` and `logs` -- the e2e_certs
## fixture in conftest.py does this for pytest runs; for ad-hoc bring-up:
##
##   docker compose -p postern-e2e -f portal/tests/e2e/e2e.compose.yaml build
##   POSTERN_E2E_TLS_DIR=$(uv run python portal/tests/e2e/_certs.py /tmp/postern-e2e-tls) \
##     docker compose -p postern-e2e -f portal/tests/e2e/e2e.compose.yaml up -d --wait
##   POSTERN_E2E_TLS_DIR=/tmp/postern-e2e-tls \
##     docker compose -p postern-e2e -f portal/tests/e2e/e2e.compose.yaml down -v
##
## Network topology (see portal/tests/e2e/PLAN notes):
##   default            - internal service mesh (portal <-> docker-proxy, mailpit; nginx <-> portal)
##   e2e-tunnel-entry   - ssclient <-> nginx (nginx aliased as postern.test here)
##   e2e-shadowsocks    - nginx <-> reconciler-spawned ss-* <-> go-httpbin
##
## ssclient cannot reach go-httpbin directly (no shared network). The only path
## is through the SOCKS proxy + nginx tunnel + ss-<token> container. That is the
## byte-round-trip proof.

services:
  portal:
    build:
      context: ../../..
      dockerfile: portal/Dockerfile
    image: local/postern-portal
    read_only: true
    tmpfs: [/tmp]
    security_opt: ["no-new-privileges:true"]
    environment:
      DOCKER_HOST: tcp://docker-proxy:2375
      SECRET_KEY: test-e2e-do-not-use-in-production
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      SMTP_FROM: noreply@postern.test
      DOMAIN: postern.test
      SHADOWSOCKS_NETWORK: e2e-shadowsocks
      RECONCILE_INTERVAL_SECONDS: "3600"
    volumes:
      - postern-e2e-data:/data
    networks: [default]
    depends_on:
      docker-proxy:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 5s
      timeout: 3s
      retries: 6
    init: true
    stop_grace_period: 30s  # gives cleanup_all_containers room to run

  nginx:
    build: ../../../nginx
    image: local/nginx
    ports:
      - "127.0.0.1:8443:443/tcp"
    volumes:
      - type: bind
        read_only: true
        source: ./nginx.conf
        target: /etc/nginx/nginx.conf
      - type: bind
        read_only: true
        source: ${POSTERN_E2E_TLS_DIR:?POSTERN_E2E_TLS_DIR must be set by the e2e fixture (see conftest.py) or exported manually}
        target: /etc/letsencrypt/live/postern.test
    networks:
      default:
      e2e-tunnel-entry:
        aliases: [postern.test]
      e2e-shadowsocks:
    depends_on:
      portal:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "--no-check-certificate", "https://localhost/healthz"]
      interval: 5s
      timeout: 3s
      retries: 6
    init: true

  docker-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.2
    environment:
      CONTAINERS: 1
      NETWORKS: 1
      IMAGES: 1
      POST: 1
    volumes:
      - type: bind
        read_only: true
        source: /var/run/docker.sock
        target: /var/run/docker.sock
    networks: [default]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:2375/_ping"]
      interval: 3s
      timeout: 2s
      retries: 6
    init: true

  mailpit:
    image: axllent/mailpit:v1.20
    ports:
      - "127.0.0.1:8025:8025/tcp"  # HTTP API for the test fixtures
    networks: [default]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025/readyz"]
      interval: 3s
      timeout: 2s
      retries: 6
    init: true

  go-httpbin:
    image: mccutchen/go-httpbin:v2.15.0
    networks: [e2e-shadowsocks]
    init: true
    # No healthcheck: the image is scratch-based (no shell, no wget). It starts in ms.

  ssclient:
    build:
      context: ../../..
      dockerfile: portal/tests/e2e/ssclient.Dockerfile
    image: local/postern-ssclient
    networks: [e2e-tunnel-entry]
    init: true
    volumes:
      # The .crt extension is load-bearing: update-ca-certificates only ingests *.crt.
      - type: bind
        read_only: true
        source: ${POSTERN_E2E_TLS_DIR:?POSTERN_E2E_TLS_DIR must be set by the e2e fixture (see conftest.py) or exported manually}/ca.pem
        target: /usr/local/share/ca-certificates/postern-test-ca.crt
    # ssclient is alpine-base (NOT distroless), so sh + busybox are available.
    # Touch the sentinel only after update-ca-certificates returns 0; the
    # healthcheck then waits on the sentinel. Greppin' the bundle file for
    # the CN is unreliable -- the bundle is base64 PEM, the CN never appears
    # in plaintext there.
    command: ["sh", "-c", "update-ca-certificates && touch /tmp/.ca-trusted && exec sleep infinity"]
    healthcheck:
      # Mandatory, not optional: compose --wait considers a no-healthcheck
      # service "ready" the moment PID 1 spawns. Without this, the very first
      # `compose exec ssclient sslocal ...` could race update-ca-certificates.
      test: ["CMD", "test", "-f", "/tmp/.ca-trusted"]
      interval: 1s
      timeout: 1s
      retries: 30

networks:
  default:
    name: postern-e2e-default
  e2e-tunnel-entry:
    name: e2e-tunnel-entry
    driver: bridge
  e2e-shadowsocks:
    name: e2e-shadowsocks
    driver: bridge

volumes:
  postern-e2e-data:
    name: postern-e2e-data
