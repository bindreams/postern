# MTA-STS policy endpoint, served at https://mta-sts.<domain>/.well-known/mta-sts.txt.
# RFC 8461 §3.3 mandates HTTPS with a publicly-trusted CA. The cert for this
# subdomain is separate from the main vhost's; provision it the same way
# (Let's Encrypt -- see docs/mta.md and README §Prerequisites).
#
# When opting out of the built-in MTA, this block is harmlessly unreachable:
# the deployer simply doesn't publish DNS for `mta-sts.<domain>`.
server {
	server_name mta-sts.postern.example.com;
	include conf.d/ssl.conf;
	include conf.d/certs/mta-sts.postern.example.com.conf;
	listen 443 ssl;
	listen [::]:443 ssl;

	add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
	add_header X-Content-Type-Options "nosniff" always;

	location = /.well-known/mta-sts.txt {
		alias /etc/nginx/conf.d/mta-sts/policy.txt;
		default_type text/plain;
		access_log off;
	}

	location / {
		return 404;
	}
}
