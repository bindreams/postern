name: Test
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  workflow_call:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --all-extras
        working-directory: portal
      - run: uv run pytest -m "not e2e" --timeout=30
        working-directory: portal

  e2e:
    runs-on: ubuntu-latest
    env:
      # Belt-and-braces: pytest's e2e_certs fixture overrides this for the
      # subprocesses it spawns, but the failure-logs step below invokes
      # `docker compose ...` from the workflow shell. compose `logs` does
      # not interpolate volume sources today, but a placeholder ensures any
      # future addition can't trip over a missing-var error that masks the
      # real CI failure being reported.
      POSTERN_E2E_TLS_DIR: /tmp/postern-e2e-tls-placeholder
    steps:
      - uses: actions/checkout@v4

      - name: Add postern.test to /etc/hosts (for the host-side pytest client)
        run: echo "127.0.0.1 postern.test" | sudo tee -a /etc/hosts

      - name: Log in to Docker Hardened Images registry
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build the per-connection shadowsocks image (compose does not build it)
        run: docker build -f shadowsocks/Dockerfile -t local/shadowsocks-server .

      - run: uv sync --group e2e
        working-directory: portal

      - run: uv run pytest -m e2e -v --timeout=180
        working-directory: portal

      - name: Dump compose logs on failure
        if: failure()
        run: |
          docker compose -p postern-e2e -f portal/tests/e2e/e2e.compose.yaml logs --no-color
          docker ps -a --filter label=postern.managed=true
