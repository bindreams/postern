services:
  nginx:
    build: ./nginx
    image: local/nginx
    container_name: nginx
    environment:
      # Required: the entrypoint renders nginx/etc/*.tmpl with ${DOMAIN} at startup.
      # Unset/empty value -> nginx refuses to start. See nginx/nginx-entrypoint.sh.
      DOMAIN: ${DOMAIN:-postern.example.com}
      # Real client IP behind a TLS-passthrough gateway (issue #98). Empty ->
      # direct-listen, no PROXY protocol (browsers connect to nginx directly).
      # compose.gateway.yaml sets a working default automatically.
      PROXY_PROTOCOL_FROM: ${PROXY_PROTOCOL_FROM:-}
      # Edge fronting (issue #155). "none" (default) -> render.sh emits no
      # edge config; the RO postern-edge mount below stays empty. "cloudflare"/
      # "generic" activate real-IP restoration. render.sh reads these raw --
      # pydantic Settings do not gate this container.
      EDGE_PROFILE: ${EDGE_PROFILE:-none}
      # Cloudflare Authenticated Origin Pull mTLS; only meaningful under
      # EDGE_PROFILE=cloudflare. render.sh FAILs LOUD on an unrecognized value.
      EDGE_CF_AUTHENTICATED_ORIGIN_PULL: ${EDGE_CF_AUTHENTICATED_ORIGIN_PULL:-true}
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
    volumes:
      # The nginx image's /etc/nginx is writable; entrypoint renders templates
      # from /etc/nginx/templates/ into /etc/nginx/ at startup. No bind mount
      # of nginx/etc/ is needed -- the source tree is baked into the image at
      # build time. /etc/letsencrypt and /var/log/nginx still bind through.
      - type: bind
        read_only: true
        source: /etc/localtime
        target: /etc/localtime
      - type: bind
        source: /etc/letsencrypt
        target: /etc/letsencrypt
      - type: bind
        source: ./nginx/log
        target: /var/log/nginx
      # CF edge IP-range allowlists written by the provisioner (rw sole-writer);
      # nginx reads RO. render.sh globs /var/lib/postern-edge/*.conf into both
      # :443 server blocks. Empty when EDGE_PROFILE=none.
      - postern-edge:/var/lib/postern-edge:ro
    networks: [default, shadowsocks]
    init: true
    restart: unless-stopped

  portal:
    build:
      context: .
      dockerfile: portal/Dockerfile
    image: local/postern-portal
    container_name: portal
    env_file: .env
    read_only: true
    tmpfs: [/tmp]
    security_opt: ["no-new-privileges:true"]
    environment:
      DOCKER_HOST: tcp://docker-proxy:2375
    volumes:
      - postern-data:/data
      # rw so `postern mta show-dns` can read state.json + selector pubkeys, AND
      # `postern mta rotate-dkim` can write the .rotate-dkim trigger. The portal
      # is trusted not to corrupt state.json -- only the provisioner writes it
      # (see rotation.write_state docstring).
      - postern-mta-data:/var/lib/opendkim
      # Optional: custom brand icon for the portal header (SVG preferred, PNG accepted;
      # <= 256 KB). Uncomment AND set PRODUCT_ICON_PATH=/brand/icon.svg in .env.
      # See docs/frontend.md.
      # - type: bind
      #   source: /var/lib/postern/brand.svg
      #   target: /brand/icon.svg
      #   read_only: true
      # Optional: GeoLite2 MMDB directory for the login-page identity card enrichment.
      # Uncomment AND set GEOIP_DB_DIR=/geoip in .env. The portal hot-reloads on mtime
      # change so monthly DB rotations need no portal restart. See docs/frontend.md.
      # - type: bind
      #   source: /var/lib/postern/geoip
      #   target: /geoip
      #   read_only: true
    networks: [default, mta-submit]
    depends_on:
      docker-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3
    init: true
    restart: unless-stopped

  mta:
    build:
      context: .
      dockerfile: mta/Dockerfile
    image: local/postern-mta
    container_name: mta
    profiles: [with-mta]
    hostname: mail.${DOMAIN:-postern.example.com}
    env_file: .env
    environment:
      MTA_SUBMIT_CIDR: 172.30.42.0/29
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, NET_BIND_SERVICE, DAC_OVERRIDE, SYS_CHROOT]
    security_opt: ["no-new-privileges:true"]
    ports:
      - "25:25/tcp"
    volumes:
      - postern-mta-data:/var/lib/opendkim
      - postern-mta-queue:/var/spool/postfix
      - type: bind
        read_only: true
        source: /etc/letsencrypt
        target: /etc/letsencrypt
    networks:
      # `default:` (null) attaches with defaults, matching the existing
      # e2e-mta.compose.yaml form so the two files stay shape-identical.
      default:
      # The bare `mta`/`postern-mta` service name is multi-homed (default +
      # mta-submit) and Docker DNS resolves it to the *default*-network IP
      # (issue #151), which is outside Postfix mynetworks (172.30.42.0/29) ->
      # submission rejected. This alias makes SMTP_HOST=mta-submit resolve to the
      # internal IP so the portal's source is in mynetworks. Keep in sync with
      # SMTP_HOST in example.env.
      mta-submit:
        aliases: [mta-submit]
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.create_connection(('127.0.0.1',25),3); s.close(); s=socket.create_connection(('127.0.0.1',587),3); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3
    init: true
    restart: unless-stopped

  provisioner:
    build:
      context: .
      dockerfile: provisioner/Dockerfile
    image: local/postern-provisioner
    container_name: provisioner
    # Multiple profiles -- a service starts when ANY listed profile is active.
    # with-cert-renewal lets cert auto-renewal run even without MTA.
    profiles: [with-mta, with-cert-renewal, with-edge]
    user: "110:110"
    env_file: .env
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    read_only: true
    tmpfs: [/tmp]
    volumes:
      - postern-mta-data:/var/lib/opendkim
      # Sole writer of the CF edge IP-range allowlists nginx consumes RO.
      - postern-edge:/var/lib/postern-edge
    networks: [default]
    init: true
    restart: "no"

  docker-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.2
    container_name: docker-proxy
    environment:
      CONTAINERS: 1
      NETWORKS: 1
      IMAGES: 1
      POST: 1
    volumes:
      - type: bind
        read_only: true
        source: /var/run/docker.sock
        target: /var/run/docker.sock
    networks: [default]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:2375/_ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    init: true
    restart: unless-stopped

networks:
  shadowsocks:
    name: shadowsocks
    driver: bridge
  mta-submit:
    name: mta-submit
    internal: true
    ipam:
      config:
        - subnet: 172.30.42.0/29

volumes:
  postern-data:
    name: postern-data
  # CF edge IP-range allowlists: provisioner writes (rw sole-writer), nginx
  # reads (ro). Empty in non-edge deployments. See compose.edge.yaml + docs/edge.md.
  postern-edge:
    name: postern-edge
  postern-mta-data:
    name: postern-mta-data
  postern-mta-queue:
    name: postern-mta-queue
  # Auto-renewal cert volume; populated by the provisioner under compose.cert.yaml
  # and mounted on nginx + mta (both ro) and provisioner + portal (both rw, the
  # provisioner writes the cert files, the portal writes the .renew-cert trigger).
  # In BYO-certs mode this volume is unused; nginx and mta bind-mount /etc/letsencrypt.
  postern-letsencrypt:
    name: postern-letsencrypt
