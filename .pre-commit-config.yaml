exclude: "^external/"
default_install_hook_types: [pre-commit, commit-msg]

# Local hooks =====
repos:
  - repo: local
    hooks:
      - id: format-section-comments
        name: format section comments
        entry: python scripts/format-section-comments.py
        language: system
        types: [python]

      - id: ty
        name: ty check
        # The Python project lives in portal/, and ty resolves third-party
        # imports via that project's .venv (configured in portal/pyproject.toml
        # under [tool.ty]).
        entry: bash -c 'cd portal && exec uvx ty check'
        language: system
        types: [python]
        pass_filenames: false

  # External hooks =====
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/editorconfig-checker/editorconfig-checker.python
    rev: "3.2.1"
    hooks:
      - id: editorconfig-checker
        exclude_types: [rust, markdown, python]

  - repo: https://github.com/google/yapf
    rev: v0.43.0
    hooks:
      - id: yapf

  - repo: https://github.com/hukkin/mdformat
    rev: "1.0.0"
    hooks:
      - id: mdformat
        additional_dependencies: [mdformat-gfm]
