<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ product_name }}{% endblock %}</title>
  <link rel="icon" href="/brand-icon">
  <link rel="stylesheet" href="/static/postern.css">
  <link rel="stylesheet" href="/static/flags/flags.css">
</head>
<body>
  <canvas id="gol-canvas" aria-hidden="true"></canvas>
  <div class="gol-overlay" aria-hidden="true"></div>

  {% block topright %}{% endblock %}
  <main class="page">
    <header class="brand-head">
      <a href="/" class="brand-mark" aria-label="{{ product_name }}"><img src="/brand-icon" alt=""></a>
      <span class="brand-name">{{ product_name }}</span>
    </header>
    {% block body %}{% endblock %}
  </main>

  <footer class="gol-foot" aria-label="Game of Life background controls">
    <div class="counters">
      <span><span class="k">tick</span><span id="gol-tick">0</span></span>
      <span><span class="k">live</span><span id="gol-live">0</span></span>
    </div>
    <div class="sep"></div>
    <div class="ctrls">
      <button id="gol-reseed" class="icon-btn" type="button" aria-label="Reseed" title="Reseed">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/>
          <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
          <path d="M3 21v-5h5"/>
        </svg>
      </button>
      <button id="gol-pause" class="icon-btn" type="button" aria-label="Pause" title="Pause">
        <svg viewBox="0 0 24 24" fill="currentColor" id="gol-pause-icon">
          <rect x="6" y="4" width="4" height="16" rx="1"/>
          <rect x="14" y="4" width="4" height="16" rx="1"/>
        </svg>
      </button>
      <button id="gol-slower" class="icon-btn" type="button" aria-label="Slower" title="Slower">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
      <button id="gol-faster" class="icon-btn" type="button" aria-label="Faster" title="Faster">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>
    <div class="sep"></div>
    <a class="repo" href="https://github.com/bindreams/postern" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 .5C5.7.5.7 5.6.7 11.9c0 5 3.3 9.3 7.9 10.8.6.1.8-.2.8-.5v-2c-3.2.7-3.9-1.4-3.9-1.4-.5-1.3-1.3-1.6-1.3-1.6-1-.7.1-.7.1-.7 1.1.1 1.7 1.2 1.7 1.2 1 1.8 2.7 1.3 3.4 1 .1-.7.4-1.3.7-1.5-2.5-.3-5.2-1.3-5.2-5.6 0-1.2.4-2.3 1.2-3.1-.1-.3-.5-1.5.1-3.1 0 0 1-.3 3.2 1.2.9-.3 1.9-.4 2.9-.4s2 .1 2.9.4c2.2-1.5 3.2-1.2 3.2-1.2.6 1.6.2 2.8.1 3.1.7.8 1.2 1.9 1.2 3.1 0 4.4-2.7 5.3-5.2 5.6.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.5 4.6-1.5 7.9-5.9 7.9-10.8C23.3 5.6 18.3.5 12 .5z"/></svg>
      bindreams/postern
    </a>
  </footer>

  <script src="/static/postern.js" defer></script>
</body>
</html>
