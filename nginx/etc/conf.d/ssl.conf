# Do not forget to include a certificate from conf.d/certs along with this file.
http2 on;

# Most settings taken from https://ssl-config.mozilla.org/#server=nginx&version=1.17.7&config=intermediate&openssl=1.1.1k&guideline=5.7
ssl_session_timeout 1d;
ssl_session_cache shared:MozSSL:10m;  # about 40000 sessions
# ssl_session_tickets off;  # Not relevant, see https://github.com/mozilla/server-side-tls/issues/135#issuecomment-1293210243

ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;
ssl_prefer_server_ciphers off;
ssl_dhparam conf.d/org.mozilla.ssl-config/ffdhe2048.txt;

# SSL stapling
ssl_stapling            on;
ssl_stapling_verify     on;

# HSTS header
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
