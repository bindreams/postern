# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

exclude = "^external/"
default_install_hook_types = ["pre-commit", "commit-msg"]

# Local hooks =====
[[repos]]
repo = "local"

[[repos.hooks]]
id = "format-section-comments"
name = "format section comments"
entry = "python scripts/format-section-comments.py"
language = "python"

[[repos.hooks]]
id = "ty"
name = "ty check"
# `--directory portal` (not `--project portal`) is load-bearing: ty reads
# `[tool.ty.rules]` from the `pyproject.toml` in its CWD, and those rules live
# in portal/pyproject.toml. With only `--project`, CWD stays at the repo root
# and the ignore rules are silently dropped.
entry = "uv run --directory portal --group dev ty check"
language = "python"
types = ["python"]
pass_filenames = false

# External hooks =====
[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v5.0.0"
hooks = [
  { id = "check-executables-have-shebangs" },
  { id = "check-shebang-scripts-are-executable" },
  { id = "mixed-line-ending", args = ["--fix=lf"] },
]

[[repos]]
repo = "https://github.com/editorconfig-checker/editorconfig-checker.python"
rev = "3.2.1"
hooks = [
  { id = "editorconfig-checker", exclude_types = ["rust", "markdown", "python"] },
]

[[repos]]
repo = "https://github.com/google/yapf"
rev = "v0.43.0"
hooks = [{ id = "yapf" }]

[[repos]]
repo = "https://github.com/hukkin/mdformat"
rev = "1.0.0"
hooks = [
  { id = "mdformat", additional_dependencies = ["mdformat-gfm"] },
]
