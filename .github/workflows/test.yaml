name: Test
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  workflow_call:

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
      - run: uv sync --all-extras
        working-directory: portal
      - run: uv run pytest -m "not e2e and not e2e_mta and not e2e_mta_real and not e2e_mta_outbound and not e2e_edge" --timeout=30
        working-directory: portal

  go-unit:
    name: postern-dns Go unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: provisioner/postern-dns
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          # Stay pinned to the toolchain the module declares. GOTOOLCHAIN=auto
          # then fetches the exact `toolchain` (go1.26.4) at build time.
          go-version-file: provisioner/postern-dns/go.mod
          cache-dependency-path: provisioner/postern-dns/go.sum
      - name: gofmt
        run: test -z "$(gofmt -l .)" || { echo "gofmt needed:"; gofmt -l .; exit 1; }
      - run: go vet ./...
      # Compile-check the maintainer-only Cloudflare contract test. It is
      # behind `//go:build cfcontract`, so untagged vet/test never compile it
      # and it would bit-rot silently on refactors of the production symbols
      # it uses. Vet compiles without executing -- no token or live zone needed.
      - run: go vet -tags cfcontract ./...
      - run: go test ./... -count=1

  e2e:
    name: End-to-end tests
    runs-on: ubuntu-latest
    env:
      # Belt-and-braces: pytest's e2e_certs fixture overrides this for the
      # subprocesses it spawns, but the failure-logs step below invokes
      # `docker compose ...` from the workflow shell. compose `logs` does
      # not interpolate volume sources today, but a placeholder ensures any
      # future addition can't trip over a missing-var error that masks the
      # real CI failure being reported.
      POSTERN_E2E_TLS_DIR: /tmp/postern-e2e-tls-placeholder
    steps:
      - uses: actions/checkout@v7

      - name: Add postern.test to /etc/hosts (for the host-side pytest client)
        run: echo "127.0.0.1 postern.test" | sudo tee -a /etc/hosts

      - name: Log in to Docker Hardened Images registry
        uses: docker/login-action@v4
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Build the per-connection shadowsocks image (compose does not build it)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: shadowsocks/Dockerfile
          tags: local/shadowsocks-server
          load: true
          cache-from: type=gha,scope=shadowsocks
          cache-to: type=gha,mode=max,scope=shadowsocks

      - name: Build e2e compose images (kept out of the pytest fixture so the build is not subject to the per-test timeout)
        uses: docker/bake-action@v5
        with:
          # workdir must be the compose file's directory: bake resolves `context:` relative
          # to its cwd, not the compose file location, and the compose file uses `../../..`
          # to point at the repo root.
          workdir: portal/tests/e2e
          files: e2e.compose.yaml
          load: true
          set: |
            *.cache-from=type=gha,scope=e2e
            *.cache-to=type=gha,mode=max,scope=e2e

      - run: uv sync --group e2e
        working-directory: portal

      - run: uv run pytest -m e2e -v --timeout=180
        working-directory: portal

      - name: Dump compose logs on failure
        if: failure()
        run: |
          docker compose -p postern-e2e -f portal/tests/e2e/e2e.compose.yaml logs --no-color
          docker ps -a --filter label=postern.managed=true

  e2e-edge:
    name: End-to-end edge-fronting tests
    runs-on: ubuntu-latest
    env:
      # Placeholders so `docker buildx bake` (and the failure `compose logs`
      # step) can interpolate the e2e-edge compose file's `:?`-required volume
      # sources. The edge fixtures (e2e_certs -> POSTERN_E2E_TLS_DIR,
      # e2e_edge_client_ca -> POSTERN_E2E_EDGE_CLIENT_CA_DIR) override both for
      # the subprocesses that actually `compose up`, so these values are never
      # bind-mounted for real.
      POSTERN_E2E_TLS_DIR: /tmp/postern-e2e-edge-tls-placeholder
      POSTERN_E2E_EDGE_CLIENT_CA_DIR: /tmp/postern-e2e-edge-ca-placeholder
    steps:
      - uses: actions/checkout@v7

      - name: Add postern.test to /etc/hosts (for the host-side pytest client)
        run: echo "127.0.0.1 postern.test" | sudo tee -a /etc/hosts

      - name: Log in to Docker Hardened Images registry
        uses: docker/login-action@v4
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      # The edge overlay only needs the portal + nginx images. It never creates a
      # connection, so the reconciler spawns no ss-* container and the
      # shadowsocks image is not required. Shared cache scope `e2e` so the
      # identical portal/nginx layers reuse artifacts from the parallel e2e job.
      - name: Build e2e-edge compose images (kept out of the pytest fixture so the build is not subject to the per-test timeout)
        uses: docker/bake-action@v5
        with:
          workdir: portal/tests/e2e
          files: e2e-edge.compose.yaml
          load: true
          set: |
            *.cache-from=type=gha,scope=e2e
            *.cache-to=type=gha,mode=max,scope=e2e

      - run: uv sync --group e2e
        working-directory: portal

      - run: uv run pytest -m e2e_edge -v --timeout=180
        working-directory: portal

      - name: Dump compose logs on failure
        if: failure()
        run: |
          docker compose -p postern-e2e-edge -f portal/tests/e2e/e2e-edge.compose.yaml logs --no-color
          docker ps -a --filter label=postern.managed=true

  e2e-mta:
    name: End-to-end MTA tests (hermetic)
    runs-on: ubuntu-latest
    env:
      POSTERN_E2E_TLS_DIR: /tmp/postern-e2e-mta-tls-placeholder
    steps:
      - uses: actions/checkout@v7

      - name: Add postern.test to /etc/hosts (for the host-side pytest client)
        run: echo "127.0.0.1 postern.test" | sudo tee -a /etc/hosts

      - name: Log in to Docker Hardened Images registry
        uses: docker/login-action@v4
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      # Bake e2e + e2e-mta together so the mta and provisioner images are built
      # alongside the existing portal/nginx/ssclient. Shared cache scope `e2e`
      # so unchanged portal layers reuse the artifacts produced by the parallel
      # e2e job (buildx's content-addressable cache deduplicates across scopes,
      # but staying in one scope is simpler).
      - name: Build e2e + e2e-mta compose images
        uses: docker/bake-action@v5
        with:
          workdir: portal/tests/e2e
          files: |
            e2e.compose.yaml
            e2e-mta.compose.yaml
          load: true
          set: |
            *.cache-from=type=gha,scope=e2e
            *.cache-to=type=gha,mode=max,scope=e2e

      - run: uv sync --group e2e
        working-directory: portal

      - run: uv run pytest -m e2e_mta -v --timeout=180
        working-directory: portal

      - name: Dump compose logs on failure
        if: failure()
        run: |
          docker compose -p postern-e2e-mta \
            -f portal/tests/e2e/e2e.compose.yaml \
            -f portal/tests/e2e/e2e-mta.compose.yaml \
            logs --no-color
          docker compose -p postern-e2e-mta \
            -f portal/tests/e2e/e2e.compose.yaml \
            -f portal/tests/e2e/e2e-mta.compose.yaml \
            ps -a

  docs:
    name: Docs build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
      # The -W reference gate is load-bearing: prove it still fails on a broken
      # link + orphan page (fixture) FOR THOSE REASONS before trusting it on
      # the real tree. Nonzero exit alone is not enough -- an unrelated crash
      # would mask a dead gate.
      - name: Reference-gate self-test (fixture must FAIL on link+orphan warnings)
        run: |
          set +e
          uv run --no-project --python 3.13 \
            --with-requirements docs/requirements.txt -- \
            sphinx-build -W --keep-going -b html \
            scripts/docs-gate-fixture scripts/docs-gate-fixture/_build > fixture.log 2>&1
          status=$?
          cat fixture.log
          test "$status" -ne 0 || { echo "fixture built clean -- reference gate is dead"; exit 1; }
          grep -q "does-not-exist" fixture.log || { echo "no broken-link warning -- gate dead"; exit 1; }
          grep -q "isn't included in any toctree" fixture.log || { echo "no orphan warning -- gate dead"; exit 1; }
      - run: >
          uv run --no-project --python 3.13
          --with-requirements docs/requirements.txt --
          sphinx-build -W --keep-going -b html docs docs/_build/html

  e2e-mta-real:
    name: End-to-end MTA tests (real DNS provider + libdns)
    runs-on: ubuntu-latest
    # Serialize across all PRs and main pushes: every run uses the same fixed
    # `postern-e2e-test` DKIM selector on the maintainer's test zone, so two
    # concurrent runs would race on publish/cleanup. cancel-in-progress=false
    # makes new runs wait rather than killing the in-flight one mid-cleanup.
    concurrency:
      group: e2e-mta-real
      cancel-in-progress: false
    env:
      MTA_TEST_DOMAIN: ${{ vars.MTA_TEST_DOMAIN }}
      MTA_TEST_DNS_PROVIDER: ${{ vars.MTA_TEST_DNS_PROVIDER }}
      MTA_TEST_DNS_PROPAGATION_SECONDS: ${{ vars.MTA_TEST_DNS_PROPAGATION_SECONDS || '60' }}
      MTA_TEST_DNSSEC_DOMAIN: ${{ vars.MTA_TEST_DNSSEC_DOMAIN || 'iana.org' }}
      # Provider-specific creds. Only the one matching MTA_TEST_DNS_PROVIDER
      # is consumed at runtime; the rest are no-ops if unset.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      GANDI_API_TOKEN: ${{ secrets.GANDI_API_TOKEN }}
      DO_AUTH_TOKEN: ${{ secrets.DO_AUTH_TOKEN }}
      OVH_ENDPOINT: ${{ secrets.OVH_ENDPOINT }}
      OVH_APPLICATION_KEY: ${{ secrets.OVH_APPLICATION_KEY }}
      OVH_APPLICATION_SECRET: ${{ secrets.OVH_APPLICATION_SECRET }}
      OVH_CONSUMER_KEY: ${{ secrets.OVH_CONSUMER_KEY }}
      HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
      LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
      NAMECHEAP_API_KEY: ${{ secrets.NAMECHEAP_API_KEY }}
      NAMECHEAP_API_USER: ${{ secrets.NAMECHEAP_API_USER }}
      NAMECHEAP_CLIENT_IP: ${{ secrets.NAMECHEAP_CLIENT_IP }}
    steps:
      - uses: actions/checkout@v7

      - name: Log in to Docker Hardened Images registry
        uses: docker/login-action@v4
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Build the provisioner image (real-infra tests use `docker run --rm` against it)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: provisioner/Dockerfile
          tags: local/postern-provisioner
          load: true
          cache-from: type=gha,scope=e2e
          cache-to: type=gha,mode=max,scope=e2e

      - run: uv sync --group e2e
        working-directory: portal

      - run: uv run pytest -m e2e_mta_real -v --timeout=300
        working-directory: portal
