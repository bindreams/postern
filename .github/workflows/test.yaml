name: test
on:
  push:
    branches: [main]
  pull_request:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  unit:
    # On same-repo PRs, both pull_request and pull_request_target fire; run unit
    # only via pull_request to avoid duplicate runs. Push events are unaffected.
    if: github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --all-extras
        working-directory: portal
      - run: uv run pytest -m "not e2e"
        working-directory: portal

  e2e:
    # Run e2e on:
    #   - push to main
    #   - same-repo PRs (via pull_request; pull_request_target also fires but is skipped)
    #   - fork PRs (via pull_request_target only; pull_request would not have secrets)
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository)
    runs-on: ubuntu-latest
    # Pick which environment supplies dhi.io secrets:
    #   - fork PR  -> e2e-dhi         (gated on maintainer approval)
    #   - else     -> e2e-dhi-trusted (no reviewers; same secrets)
    environment:
      name: ${{ (github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository) && 'e2e-dhi' || 'e2e-dhi-trusted' }}
    steps:
      - uses: actions/checkout@v4
        with:
          # pull_request_target defaults to base; explicitly pull the PR head.
          # Same-repo PRs and pushes use github.sha (the default) via the fallback.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Add postern.test to /etc/hosts (for the host-side pytest client)
        run: echo "127.0.0.1 postern.test" | sudo tee -a /etc/hosts

      - name: Log in to Docker Hardened Images registry
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build the per-connection shadowsocks image (compose does not build it)
        run: docker build -f shadowsocks/Dockerfile -t local/shadowsocks-server .

      - run: uv sync --group e2e
        working-directory: portal

      - run: uv run pytest -m e2e -v --timeout=180
        working-directory: portal

      - name: Dump compose logs on failure
        if: failure()
        run: |
          docker compose -p postern-e2e -f portal/tests/e2e/e2e.compose.yaml logs --no-color
          docker ps -a --filter label=postern.managed=true
