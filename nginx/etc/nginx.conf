error_log /var/log/nginx/error.log warn;
worker_processes auto;

events {}

http {
	server_tokens off;
	include mime.types;
	resolver 127.0.0.11 valid=5s; # Docker DNS, short TTL for container IP changes

	map $http_upgrade $connection_upgrade {
		default upgrade;
		'' close;
	}

	limit_req_zone $binary_remote_addr zone=auth:1m rate=10r/m;

	# Portal + new path-based VPN routing =====
	server {
		server_name voyager.binarydreams.me;
		include conf.d/ssl.conf;
		include conf.d/certs/voyager.binarydreams.me.conf;
		listen 443 ssl fastopen=256 so_keepalive=on;
		listen [::]:443 ssl fastopen=256 so_keepalive=on;

		# HSTS must be re-added here (nginx add_header inheritance is broken
		# when any add_header is used in the same block as an include that also uses add_header)
		add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
		add_header X-Content-Type-Options "nosniff" always;
		add_header X-Frame-Options "DENY" always;
		add_header Content-Security-Policy "default-src 'self'" always;
		add_header Referrer-Policy "no-referrer" always;
		add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

		# VPN tunnel endpoints (path-based, WebSocket only, no logs) -----
		location ~ "^/t/([a-f0-9]{24})$" {
			if ($http_upgrade != "websocket") {
				return 404;
			}

			proxy_pass http://ss-$1;
			proxy_redirect off;
			proxy_http_version 1.1;
			proxy_read_timeout 1d;
			proxy_send_timeout 1d;
			proxy_buffering off;
			proxy_request_buffering off;
			proxy_socket_keepalive on;

			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection $connection_upgrade;

			proxy_set_header Host $http_host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

			access_log off;
		}

		# Auth endpoints (rate limited) -----
		location /login {
			limit_req zone=auth burst=5 nodelay;

			proxy_pass http://portal:8000;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
		}

		location = /login/verify {
			limit_req zone=auth burst=5 nodelay;

			proxy_pass http://portal:8000;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
		}

		# Portal (all other paths) -----
		location / {
			proxy_pass http://portal:8000;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
		}
	}

	# Catch-all 404 =====
	server {
		include conf.d/ssl.conf;
		include conf.d/certs/voyager.binarydreams.me.conf;
		listen 443 default_server ssl;
		listen [::]:443 default_server ssl;

		return 404;
	}

	# HTTP -> HTTPS redirect =====
	server {
		listen 80 default_server;
		listen [::]:80 default_server;

		return 308 https://$host$request_uri;
	}
}
