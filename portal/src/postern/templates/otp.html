{% extends "base.html" %}
{% block title %}Verify — {{ product_name }}{% endblock %}
{% block body %}
<section class="card-base lc" aria-labelledby="otp-title">
  <h1 id="otp-title">Enter code</h1>
  <div class="sub">If this email is registered, you will receive a one-time code.</div>
  {% if error %}
  <div class="message message-error">{{ error }}</div>
  {% endif %}
  <form method="post" action="/login/verify">
    <label for="code">6-digit code</label>
    <input
      type="text" id="code" name="code"
      required autofocus
      pattern="[0-9]{6}" maxlength="6"
      inputmode="numeric" autocomplete="one-time-code"
      placeholder="000000">
    <div class="grow"></div>
    <button type="submit" class="primary">Verify</button>
  </form>
</section>
{% endblock %}
