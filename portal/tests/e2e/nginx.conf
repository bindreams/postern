error_log /dev/stderr warn;
worker_processes auto;

events {}

http {
	server_tokens off;
	include mime.types;
	resolver 127.0.0.11 valid=5s; # Docker DNS, short TTL for container IP changes

	map $http_upgrade $connection_upgrade {
		default upgrade;
		'' close;
	}

	# E2E-ONLY: rate intentionally diverges from production [nginx/etc/nginx.conf]
	# which uses 10r/m, burst=5. All e2e tests share one source IP (the docker
	# bridge gateway, since nginx is reached via the published 127.0.0.1:8443
	# port), so the production rate exhausts the bucket mid-suite and produces
	# a 503 on /login/verify (GitHub issue #7).
	#
	# Sizing derivation:
	#   - Current suite issues 8 auth-zone requests in roughly 6s on fast
	#     runners. burst >= 8 is the absolute floor.
	#   - Headroom factor of ~2.5x for future tests gives burst = 20.
	#   - rate = 600r/m (10/s) refills the burst bucket fully in 2s, so
	#     back-to-back tests cannot exhaust headroom.
	#   - test_login_rate_limit_has_suite_burst_headroom fires burst+1=21
	#     sequential POSTs to /login and asserts no 503; that test fails
	#     before the suite-level flake reappears if a future change tightens
	#     the rate.
	#
	# The application layer still enforces per-email OTP rate limiting via
	# Settings.otp_max_requests_per_window (3 per email per 15min). Per-IP
	# login flooding is genuinely less protected here than in prod; that is
	# acceptable because nothing attacks the e2e stack.
	limit_req_zone $binary_remote_addr zone=auth:1m rate=600r/m;

	# Portal + new path-based VPN routing =====
	server {
		server_name postern.test;

		# Inlined ssl.conf (minus ssl_stapling; self-signed test cert has no OCSP responder) -----
		http2 on;
		ssl_session_timeout 1d;
		ssl_session_cache shared:MozSSL:10m;
		ssl_protocols TLSv1.2 TLSv1.3;
		ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;
		ssl_prefer_server_ciphers off;
		# ssl_dhparam intentionally omitted: e2e only needs ECDHE-based suites,
		# and avoiding the file dependency keeps us off bind-mounting /etc/nginx wholesale.

		ssl_certificate         /etc/letsencrypt/live/postern.test/fullchain.pem;
		ssl_certificate_key     /etc/letsencrypt/live/postern.test/privkey.pem;
		ssl_trusted_certificate /etc/letsencrypt/live/postern.test/chain.pem;

		listen 443 ssl fastopen=256 so_keepalive=on;
		listen [::]:443 ssl fastopen=256 so_keepalive=on;

		add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
		add_header X-Content-Type-Options "nosniff" always;
		add_header X-Frame-Options "DENY" always;
		add_header Content-Security-Policy "default-src 'self'" always;
		add_header Referrer-Policy "no-referrer" always;
		add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

		# VPN tunnel endpoints (path-based, WebSocket only, no logs) -----
		location ~ "^/t/([a-f0-9]{24})$" {
			if ($http_upgrade != "websocket") {
				return 404;
			}

			proxy_pass http://ss-$1;
			proxy_redirect off;
			proxy_http_version 1.1;
			proxy_read_timeout 1d;
			proxy_send_timeout 1d;
			proxy_buffering off;
			proxy_request_buffering off;
			proxy_socket_keepalive on;

			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection $connection_upgrade;

			proxy_set_header Host $http_host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

			access_log off;
		}

		# Auth endpoints (rate limited) -----
		location /login {
			limit_req zone=auth burst=20 nodelay;

			proxy_pass http://portal:8000;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
		}

		location = /login/verify {
			limit_req zone=auth burst=20 nodelay;

			proxy_pass http://portal:8000;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
		}

		# Portal (all other paths) -----
		location / {
			proxy_pass http://portal:8000;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
		}
	}

	# HTTP -> HTTPS redirect =====
	server {
		listen 80 default_server;
		listen [::]:80 default_server;

		return 308 https://$host$request_uri;
	}
}
